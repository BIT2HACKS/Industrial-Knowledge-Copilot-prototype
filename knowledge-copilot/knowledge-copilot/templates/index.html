<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industrial Knowledge Copilot</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e6e8ec;
    --text-muted: #8b93a3;
    --accent: #3b82f6;
    --high: #22c55e;
    --medium: #eab308;
    --low: #ef4444;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .app { max-width: 780px; margin: 0 auto; padding: 0 16px; min-height: 100vh; display: flex; flex-direction: column; }
  header {
    padding: 18px 0 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  header h1 { font-size: 17px; font-weight: 600; margin: 0; }
  header .doc-count { font-size: 12px; color: var(--text-muted); }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg { max-width: 92%; }
  .msg.user { align-self: flex-end; }
  .msg.bot { align-self: flex-start; }
  .bubble {
    padding: 12px 14px;
    border-radius: var(--radius);
    line-height: 1.5;
    font-size: 14.5px;
    white-space: pre-wrap;
  }
  .msg.user .bubble { background: var(--accent); color: #fff; }
  .msg.bot .bubble { background: var(--panel); border: 1px solid var(--border); }
  .confidence {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    padding: 3px 9px;
    border-radius: 999px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .confidence.high { background: rgba(34,197,94,0.15); color: var(--high); }
  .confidence.medium { background: rgba(234,179,8,0.15); color: var(--medium); }
  .confidence.low { background: rgba(239,68,68,0.15); color: var(--low); }
  .confidence.none { background: rgba(139,147,163,0.15); color: var(--text-muted); }
  .sources { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .source {
    font-size: 12.5px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text-muted);
  }
  .source .doc-name { color: var(--text); font-weight: 600; }
  .source .score { float: right; color: var(--text-muted); }
  .feedback-row { margin-top: 10px; display: flex; gap: 8px; align-items: center; }
  .feedback-row button {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    border-radius: 6px; padding: 4px 9px; font-size: 12px; cursor: pointer;
  }
  .feedback-row button:hover { border-color: var(--accent); color: var(--text); }
  .expert-correction {
    margin-top: 8px; font-size: 13px; padding: 8px 10px;
    background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3);
    border-radius: 8px;
  }
  .expert-correction b { color: var(--accent); }
  form#composer {
    display: flex; gap: 8px; padding: 12px 0 16px;
    border-top: 1px solid var(--border);
  }
  #question {
    flex: 1; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); font-size: 15px;
  }
  #question:focus { outline: none; border-color: var(--accent); }
  #composer button {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 0 18px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .upload-btn {
    font-size: 12px; color: var(--text-muted); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; cursor: pointer; background: var(--panel);
  }
  .typing { color: var(--text-muted); font-size: 13px; font-style: italic; }
  @media (max-width: 480px) {
    .msg { max-width: 96%; }
    header h1 { font-size: 15px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>Industrial Knowledge Copilot</h1>
      <div class="doc-count" id="docCount">Loading document index…</div>
    </div>
    <label class="upload-btn">
      + Upload doc
      <input type="file" id="fileInput" style="display:none" accept=".txt,.pdf,.docx,.csv,.png,.jpg,.jpeg">
    </label>
  </header>

  <div id="chat"></div>

  <form id="composer">
    <input type="text" id="question" placeholder="Ask about equipment, procedures, incidents…" autocomplete="off">
    <button type="submit">Ask</button>
  </form>
</div>

<script>
const chat = document.getElementById('chat');
const form = document.getElementById('composer');
const input = document.getElementById('question');
const fileInput = document.getElementById('fileInput');
const docCount = document.getElementById('docCount');

async function loadDocCount() {
  const res = await fetch('/api/documents');
  const data = await res.json();
  docCount.textContent = `${data.documents.length} documents indexed · ${data.chunk_count} chunks`;
}
loadDocCount();

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble"></div>`;
  div.querySelector('.bubble').textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="bubble typing">Searching the knowledge base…</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function addBotMessage(data) {
  const div = document.createElement('div');
  div.className = 'msg bot';

  const sourcesHtml = (data.sources || []).map(s => `
    <div class="source">
      <span class="doc-name">${s.doc_name}</span>
      <span class="score">match ${s.score}</span><br>
      ${s.excerpt.replace(/</g,'&lt;')}${s.excerpt.length >= 300 ? '…' : ''}
    </div>
  `).join('');

  const correctionHtml = data.expert_correction
    ? `<div class="expert-correction"><b>Expert correction on file:</b> ${data.expert_correction}</div>`
    : '';

  div.innerHTML = `
    <span class="confidence ${data.confidence.level}">
      ${data.confidence.level.toUpperCase()} CONFIDENCE · ${data.confidence.score}
    </span>
    <div class="bubble">${data.answer.replace(/</g,'&lt;')}</div>
    ${correctionHtml}
    <div class="sources">${sourcesHtml}</div>
    <div class="feedback-row">
      <span style="font-size:12px;color:var(--text-muted)">Was this helpful?</span>
      <button data-rating="up">👍</button>
      <button data-rating="down">👎</button>
    </div>
  `;

  const question = data.question;
  const answer = data.answer;
  div.querySelectorAll('.feedback-row button').forEach(btn => {
    btn.addEventListener('click', async () => {
      let correction = null;
      if (btn.dataset.rating === 'down') {
        correction = prompt('What should the correct answer be? (This gets saved so the same question is answered correctly next time.)');
      }
      await fetch('/api/feedback', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question, answer, rating: btn.dataset.rating, correction})
      });
      btn.textContent = btn.dataset.rating === 'up' ? '👍 thanks' : '👎 noted';
      btn.disabled = true;
    });
  });

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;
  addUserMessage(question);
  input.value = '';
  addTyping();

  try {
    const res = await fetch('/api/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question})
    });
    const data = await res.json();
    removeTyping();
    addBotMessage(data);
  } catch (err) {
    removeTyping();
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `<div class="bubble">Something went wrong: ${err}</div>`;
    chat.appendChild(div);
  }
});

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('file', file);
  docCount.textContent = 'Ingesting new document…';
  const res = await fetch('/api/upload', { method: 'POST', body: formData });
  const data = await res.json();
  if (data.error) {
    alert(data.error);
  }
  loadDocCount();
});
</script>
</body>
</html>
